{% extends "base.html" %}

{% block titulo %}Iniciar sesión{% endblock %}

{% block contenido %}
  <div class="pantalla-login">
    <div class="tarjeta-login">
      <span class="numero-ficha">SISTEMA DE FICHAS</span>
      <h1>Panel admin</h1>
      <p class="subtitulo">Inicia sesión para continuar</p>

      <form method="post">
        <div class="campo">
          <label for="usuario">Usuario</label>
          <input type="text" id="usuario" name="usuario" required autofocus>
        </div>
        <div class="campo">
          <label for="clave">Contraseña</label>
          <input type="password" id="clave" name="clave" required>
        </div>
        <button class="boton boton-primario" type="submit" style="width:100%;">Entrar</button>
      </form>
    </div>
  </div>
{% endblock %}
